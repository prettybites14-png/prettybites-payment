<!doctype html>
<html lang="en" dir="ltr"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Weekly Meals - Pretty Bites Admin</title><link rel="stylesheet" href="../assets/style.css" /><script src="../assets/config.js"></script></head><body>
<a class="backBtn" id="backBtn" href="#" onclick="history.length>1?history.back():location.href='dashboard.html';return false;">Back</a><div class="topbar"><a class="brand" href="dashboard.html">Admin Panel</a><div class="actions"><a class="btn" href="weekly-orders.html">Weekly Orders</a></div></div>
<main class="container"><div class="sectionTitle">Weekly Meal Plan Settings</div><div class="gridAdmin2"><div class="formCard"><label class="lbl">Section Title</label><input class="inp" id="title"><label class="lbl">Subtitle</label><input class="inp" id="subtitle"><label class="lbl">Description</label><textarea class="inp" id="description"></textarea><label class="lbl">Main Banner Image URL</label><input class="inp" id="image"><div class="small muted" style="margin-top:8px">You can also upload a new hero image from your computer.</div><input type="file" id="imageFile" accept="image/*" class="inp" style="margin-top:8px"><div class="weeklyAdminBannerPreview" style="margin-top:12px"><img id="heroPreview" alt="Weekly plan hero preview"></div><div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap"><label><input type="checkbox" id="enabled"> Enable section</label><label><input type="checkbox" id="pickupEnabled"> Pickup</label><label><input type="checkbox" id="deliveryEnabled"> Delivery</label></div></div><div class="formCard"><label class="lbl">Weekly Package Price</label><input class="inp" id="packagePrice" type="number" step="0.01"><label class="lbl">Delivery Fee Per Day</label><input class="inp" id="deliveryFeePerDay" type="number" step="0.01"><label class="lbl">Customer Note</label><textarea class="inp" id="notice"></textarea><div class="pageCard" style="margin-top:12px;padding:12px"><div class="kv"><span>Weekly Delivery Total</span><b id="weeklyDeliveryTotal">$0.00</b></div><div class="kv"><span>Weekly Grand Total</span><b id="weeklyGrandTotal">$0.00</b></div></div></div></div><div class="sectionTitle">Meals By Day</div><div class="weeklyAdminDays" id="daysEditor"></div><div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn btnPrimary" id="saveBtn">Save Weekly Meal Plan</button><a class="btn" href="../weekly-meals.html" target="_blank">Open Front Page</a></div></main><div class="toast" id="toast"></div>
<script src="../assets/app.js"></script><script>
ensureData();applyTheme();if(!adminIsOk())nav('login.html');let cfg=getWeeklyConfig();
function render(){cfg=getWeeklyConfig();title.value=cfg.title||'';subtitle.value=cfg.subtitle||'';description.value=cfg.description||'';image.value=cfg.image||'';heroPreview.src=cfg.image||'';enabled.checked=!!cfg.enabled;pickupEnabled.checked=!!cfg.pickupEnabled;deliveryEnabled.checked=!!cfg.deliveryEnabled;packagePrice.value=Number(cfg.packagePrice||0);deliveryFeePerDay.value=Number(cfg.deliveryFeePerDay||0);notice.value=cfg.notice||'';daysEditor.innerHTML=(cfg.days||[]).map((d,i)=>`<div class="weeklyAdminDayCard"><div class="weeklyAdminDayHeader"><div class="weeklyAdminDayTitle">${d.label}</div><div class="small muted">Day ${i+1}</div></div><div class="weeklyAdminDayBody"><div class="weeklyAdminThumbWrap"><img class="weeklyAdminThumb" id="dayPreview_${i}" src="${escapeHtmlAttr(d.image||cfg.image||'')}" alt="${escapeHtmlAttr(d.label)}"><label class="btn smallBtn" style="margin-top:10px;display:inline-flex;justify-content:center;cursor:pointer">Upload<input type="file" class="dayImageFile" data-i="${i}" accept="image/*" hidden></label></div><div><label class="lbl">Meal Name</label><input class="inp dayMeal" data-i="${i}" value="${escapeHtmlAttr(d.meal||'')}"><label class="lbl">Description</label><textarea class="inp dayDesc" data-i="${i}">${escapeHtml(d.desc||'')}</textarea><label class="lbl">Image URL</label><input class="inp dayImage" data-i="${i}" value="${escapeHtmlAttr(d.image||'')}"></div></div></div>`).join('');bindDayUploads();updateTotals();}
function bindDayUploads(){document.querySelectorAll('.dayImageFile').forEach(inp=>{inp.addEventListener('change',async()=>{const i=inp.dataset.i;const f=inp.files&&inp.files[0];if(!f)return;try{const url=await pbUploadImageToSupabase(f,'weekly-day');const field=document.querySelector(`.dayImage[data-i="${i}"]`);if(field)field.value=url;const prev=document.getElementById(`dayPreview_${i}`);if(prev)prev.src=url;}catch(e){alert(e.message||'Upload failed');}});});}
function updateTotals(){const c=collect(false);document.getElementById('weeklyDeliveryTotal').textContent=money(pbWeeklyDeliveryTotal(c));document.getElementById('weeklyGrandTotal').textContent=money(pbWeeklyGrandTotal('delivery',c));heroPreview.src=image.value.trim()||'';document.querySelectorAll('.dayImage').forEach(el=>{const prev=document.getElementById(`dayPreview_${el.dataset.i}`);if(prev)prev.src=el.value.trim()||image.value.trim()||'';});}
function collect(validate=true){const next=Object.assign({},cfg,{title:title.value.trim()||'Weekly Meal Plan',subtitle:subtitle.value.trim()||'5 Meals Per Week',description:description.value.trim(),image:image.value.trim(),enabled:enabled.checked,pickupEnabled:pickupEnabled.checked,deliveryEnabled:deliveryEnabled.checked,packagePrice:Number(packagePrice.value||0),deliveryFeePerDay:Number(deliveryFeePerDay.value||0),notice:notice.value.trim()});next.days=(cfg.days||[]).map((d,i)=>({...d,meal:(document.querySelector(`.dayMeal[data-i="${i}"]`)||{}).value?.trim()||'',desc:(document.querySelector(`.dayDesc[data-i="${i}"]`)||{}).value?.trim()||'',image:(document.querySelector(`.dayImage[data-i="${i}"]`)||{}).value?.trim()||''}));if(validate&&!next.pickupEnabled&&!next.deliveryEnabled)throw new Error('Enable Pickup or Delivery at minimum.');return next;}
saveBtn.onclick=()=>{try{const next=collect(true);setWeeklyConfig(next);toast('Weekly meal plan saved ✅');render();}catch(e){alert(e.message||e);}};imageFile.addEventListener('change',async()=>{const f=imageFile.files&&imageFile.files[0];if(!f)return;try{image.value=await pbUploadImageToSupabase(f,'weekly');updateTotals();}catch(e){return alert(e.message||'Failed to upload hero image');}});['input','change'].forEach(evt=>document.addEventListener(evt,e=>{if(['title','image','packagePrice','deliveryFeePerDay'].includes(e.target.id)||e.target.classList.contains('dayMeal')||e.target.classList.contains('dayDesc')||e.target.classList.contains('dayImage'))updateTotals();}));render();function escapeHtml(str){return String(str||'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}function escapeHtmlAttr(str){return escapeHtml(str);}
</script></body></html>
