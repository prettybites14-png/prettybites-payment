<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>الكروت - Pretty Bites</title>
  <link rel="stylesheet" href="../assets/style.css" />
<script src="../assets/config.js"></script>
</head>
<body>
  <a class="backBtn" id="backBtn" href="#" onclick="history.length>1?history.back():location.href='../index.html';return false;">رجوع</a>
  <div class="topbar">
    <a class="brand" href="dashboard.html">رجوع</a>
  </div>

  <main class="container">
    <div class="sectionTitle">الكروت والأقسام</div>

    <div class="formCard">
      <div style="font-weight:1000;margin-bottom:10px">إضافة كرت جديد</div>

      <label class="lbl">اسم الكرت</label>
      <input class="inp" id="title" />

      <label class="lbl">رمز القسم (Slug) — يُنشأ تلقائياً</label>
      <input class="inp" id="slug" placeholder="مثال: حلويات" readonly />
      <label style="display:flex;gap:8px;align-items:center;margin-top:8px;opacity:.9">
        <input type="checkbox" id="manualSlug" /> تعديل يدوي
      </label>

      <label class="lbl">صورة الكرت</label>
      <input class="inp" id="image" placeholder="رابط (اختياري) https://..." />
      <input class="inp" id="cardImageFile" type="file" accept="image/*" />
      <div class="hint" style="opacity:.8;margin-top:6px">تقدر تختار صورة من جهازك (تنحفظ على Supabase Storage) أو تحط رابط.</div>
      <div id="cardPrevWrap" style="margin-top:10px;display:none">
        <img id="cardPrev" alt="" style="width:100%;max-height:220px;object-fit:cover;border-radius:16px;border:1px solid rgba(255,255,255,.12)"/>
      </div>

      <button class="btn btnPrimary" id="add" style="width:100%;margin-top:14px;padding:12px 14px;border-radius:16px">إضافة</button>
    </div>

    <div style="margin-top:14px;font-weight:1000">الكروت الحالية</div>
    <div id="list" style="display:grid;gap:10px;margin-top:10px"></div>
    <input id="editCardImageFile" type="file" accept="image/*" style="display:none" />
  </main>

  <script src="../assets/app.js"></script>
  <script>
    ensureData();
    const titleEl = document.getElementById("title");
    const slugEl = document.getElementById("slug");
    const manualSlug = document.getElementById("manualSlug");

    function makeSlugFromTitle(t){
      return String(t||"").trim(); // يسمح بالعربي والإنجليزي
    }

    function syncSlug(){
      if(!manualSlug || !slugEl || !titleEl) return;
      if(manualSlug.checked) return;
      slugEl.value = makeSlugFromTitle(titleEl.value);
    }

    if(titleEl) titleEl.addEventListener("input", syncSlug);
    if(manualSlug){
      manualSlug.addEventListener("change", ()=>{
        if(!slugEl) return;
        slugEl.readOnly = !manualSlug.checked;
        if(!manualSlug.checked) syncSlug();
      });
    }
 applyTheme();
    if(!adminIsOk()) nav("login.html");
    pbSyncCatalogFromSupabase().then(()=>{ render(); applyTheme(); }).catch(()=>{});
    window.pbRealtimeRefresh = ()=>{ render(); applyTheme(); };
    pbEnableRealtime(window.pbRealtimeRefresh);

    function slugify(s){
      return String(s||"").trim().toLowerCase().replace(/[^\p{L}\p{N}\s-]/gu,"").replace(/\s+/g,"-").replace(/-+/g,"-");
    }

    function render(){
      const cards = getCards().sort((a,b)=>(a.sort||0)-(b.sort||0));
      const list = document.getElementById("list");
      list.innerHTML = cards.map(c=>`
        <div class="formCard" style="display:flex;gap:12px;align-items:center">
          <div style="width:62px;height:62px;border-radius:16px;overflow:hidden;background:rgba(255,255,255,.06)">
            ${c.image ? `<img src="${c.image}" style="width:100%;height:100%;object-fit:cover">`:""}
          </div>
          <div style="flex:1">
            <div style="font-weight:1000">${escapeHtml(c.title)}</div>
            <div style="opacity:.8;font-weight:800">slug: ${escapeHtml(c.slug)} • ترتيب: ${c.sort||0} • ${c.enabled ? "مفعل":"مخفي"}</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn" onclick="move('${c.id}',-1)">⬆</button>
            <button class="btn" onclick="move('${c.id}', 1)">⬇</button>
            <button class="btn" onclick="toggle(\'${c.id}\')">${c.enabled ? "إخفاء":"إظهار"}</button>
            <button class="btn" onclick="changeCardImage(\'${c.id}\')">تغيير الصورة</button>
            <button class="btn" style="border-color:rgba(255,80,120,.4)" onclick="delCard('${c.id}')">حذف</button>
          </div>
        </div>
      `).join("");
    }

    function move(id, dir){
      const cards = getCards().sort((a,b)=>(a.sort||0)-(b.sort||0));
      const i = cards.findIndex(x=>x.id===id);
      const j = i+dir;
      if(j<0 || j>=cards.length) return;
      const a = cards[i], b = cards[j];
      const tmp = a.sort; a.sort = b.sort; b.sort = tmp;
      setCards(cards);
      render();
    }
    function toggle(id){
      const cards = getCards();
      const c = cards.find(x=>x.id===id);
      if(!c) return;
      c.enabled = !c.enabled;
      setCards(cards);
      render();
    }
    function delCard(id){
      if(!confirm("حذف الكرت؟")) return;
      const cards = getCards().filter(x=>x.id!==id);
      setCards(cards);
      render();
    }

    function previewLocalImage(file, imgEl, wrapEl){
      if(!file || !imgEl || !wrapEl){
        if(wrapEl) wrapEl.style.display = "none";
        return;
      }
      const localUrl = URL.createObjectURL(file);
      imgEl.src = localUrl;
      wrapEl.style.display = "block";
      imgEl.onload = ()=> URL.revokeObjectURL(localUrl);
    }

    const cardPrevWrap = document.getElementById("cardPrevWrap");
    const cardPrev = document.getElementById("cardPrev");
    const cardFile = document.getElementById("cardImageFile");
    if(cardFile){
      cardFile.addEventListener("change", async ()=>{
        const f = cardFile.files && cardFile.files[0];
        if(!f){ cardPrevWrap.style.display="none"; return; }
        previewLocalImage(f, cardPrev, cardPrevWrap);
      });
    }

    document.getElementById("add").onclick = async ()=>{
      const title = document.getElementById("title").value.trim();
      let slug = document.getElementById("slug").value.trim();
      let image = document.getElementById("image").value.trim();
      const f = cardFile && cardFile.files && cardFile.files[0];
      if(f){
        try{
          image = await pbUploadImageToSupabase(f, 'cards');
        }catch(err){
          console.error(err);
          return alert(err.message || 'فشل رفع الصورة');
        }
      }
      if(!title) return alert("اكتب اسم الكرت");
      if(!slug) slug = slugify(title) || "section";
      const cards = getCards();
      if(cards.some(c=>c.slug===slug)) return alert("Slug موجود. غيّره");
      const max = cards.length ? Math.max(...cards.map(c=>c.sort||0)) : 0;
      cards.push({ id: uid(), title, subtitle:"", image, slug, enabled:true, sort: max+1 });
      setCards(cards);
      document.getElementById("title").value="";
      document.getElementById("slug").value="";
      document.getElementById("image").value="";
      if(cardFile) cardFile.value="";
      cardPrevWrap.style.display="none";
      render();
      alert("تمت الإضافة ✅");
    };

    const editCardFile = document.getElementById("editCardImageFile");
    let editCardId = null;
    window.changeCardImage = (id)=>{
      editCardId = id;
      if(editCardFile) editCardFile.click();
    };
    if(editCardFile){
      editCardFile.addEventListener("change", async ()=>{
        const f = editCardFile.files && editCardFile.files[0];
        if(!f || !editCardId) return;
        let url = '';
        try{
          url = await pbUploadImageToSupabase(f, 'cards');
        }catch(err){
          console.error(err);
          alert(err.message || 'فشل رفع الصورة');
          editCardFile.value="";
          editCardId = null;
          return;
        }
        const cards = getCards();
        const c = cards.find(x=>x.id===editCardId);
        if(c){ c.image = url; setCards(cards); render(); toast("تم تحديث الصورة ✅"); }
        editCardFile.value="";
        editCardId = null;
      });
    }

    function escapeHtml(str){
      return String(str||"").replace(/[&<>"']/g, s => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[s]));
    }

    render();
  </script>

<script>
(function(){
  const btn = document.getElementById('backBtn');
  if(!btn) return;

  const path = (location.pathname || '').toLowerCase();
  const isHome = path.endsWith('/index.html') || path === '/' || path === '' || path.endsWith('/');
  if(isHome) btn.style.display = 'none';
})();
</script>

</body>
</html>
