<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>شاشة المطبخ - Pretty Bites</title>
  <link rel="stylesheet" href="../assets/style.css" />
  <style>
    
/* === Pretty Bites: Strong Kitchen Colors v2 (targets .orderCard.st-*) === */
.orderCard{
  transition: all .25s ease;
  border-radius: 20px;
  border: 2px solid rgba(255,255,255,.10);
}
.orderCard:hover{ transform: translateY(-2px); }

@keyframes pbPulseNew{
  0%{transform:scale(1)}
  50%{transform:scale(1.03)}
  100%{transform:scale(1)}
}

.orderCard.st-new{
  background: linear-gradient(135deg,#1346ff,#00c6ff) !important;
  border-color:#00e0ff !important;
  box-shadow: 0 0 0 3px rgba(0,224,255,.30), 0 0 36px rgba(0,150,255,.80) !important;
  animation: pbPulseNew 1.1s infinite;
}



.orderCard.st-working{
  background: linear-gradient(135deg,#ff7a00,#ffb347) !important;
  border-color:#ff8c00 !important;
  box-shadow:0 0 0 3px rgba(255,140,0,.35),0 0 35px rgba(255,140,0,.9) !important;
}



.orderCard.st-ready{
  background: linear-gradient(135deg,#00b894,#00ff95) !important;
  border-color:#00ffb3 !important;
  box-shadow: 0 0 0 3px rgba(0,255,179,.28), 0 0 34px rgba(0,255,170,.85) !important;
}

.orderCard.st-delayed{
  background: linear-gradient(135deg,#7d2ae8,#e056fd) !important;
  border-color:#c56cf0 !important;
  box-shadow: 0 0 0 3px rgba(197,108,240,.30), 0 0 34px rgba(200,0,255,.75) !important;
}



.orderCard.st-delivered{
  background: linear-gradient(135deg,#5a3216,#8b5a2b) !important;
  border-color:#8b5a2b !important;
  box-shadow:0 0 0 3px rgba(139,90,43,.40),0 0 35px rgba(139,90,43,.85) !important;
  color:#fff !important;
}



.orderCard.st-cancelled{
  background: linear-gradient(135deg,#ff2a2a,#ff0000) !important;
  border-color:#ff0000 !important;
  box-shadow: 0 0 0 3px rgba(255,0,0,.26), 0 0 34px rgba(255,0,0,.85) !important;
  opacity:.92;
}
/* === End Strong Kitchen Colors v2 === */
.kTop{ display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
    .pill2{ padding:8px 12px; border-radius:999px; border:1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.08); color:white; cursor:pointer; font-weight:900; }
    .pill2.on{ border:none; background: linear-gradient(90deg,var(--g1),var(--g2),var(--g3)); color:#06101a; }
    .orderGrid{ display:grid; grid-template-columns: repeat(auto-fit,minmax(320px,1fr)); gap:12px; margin-top:12px; }
    .orderCard{ border-radius:20px; border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.05); padding:14px; box-shadow:0 18px 50px rgba(0,0,0,.30); }
    .orderCard.delayed{ outline:2px solid rgba(177,92,255,.55); box-shadow:0 0 0 6px rgba(177,92,255,.15), 0 18px 50px rgba(0,0,0,.30); }
    .itemRow{ display:flex; justify-content:space-between; gap:10px; padding:10px; border-radius:14px; background: rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08); }
    .stBtn{ padding:10px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.08); color:white; cursor:pointer; font-weight:1000; }
    .stBtn.on{ border:none; background: linear-gradient(90deg,var(--g1),var(--g2),var(--g3)); color:#06101a; }
    .stBtn.purple.on{ border:none; background: linear-gradient(90deg,#8a2be2,#b15cff,#ff3d8d); color:white; }
    .timerG{ color:#38ff88; font-weight:900; }
    .timerY{ color:#ffb703; font-weight:900; }
    .timerR{ color:#ff3d3d; font-weight:900; }

    .orderCard.st-new{ border-color: rgba(56,255,136,.35); box-shadow:0 0 0 6px rgba(56,255,136,.10), 0 18px 50px rgba(0,0,0,.30); }
    .orderCard.st-preparing{
  background: linear-gradient(135deg,#ff7a00,#ffb347) !important;
  border-color:#ff8c00 !important;
  box-shadow:0 0 0 3px rgba(255,140,0,.35),0 0 35px rgba(255,140,0,.9) !important;
  color:#fff !important;
}
    .orderCard.st-delayed{ border-color: rgba(177,92,255,.40); box-shadow:0 0 0 6px rgba(177,92,255,.12), 0 18px 50px rgba(0,0,0,.30); }
    .orderCard.st-ready{ border-color: rgba(0,212,255,.35); box-shadow:0 0 0 6px rgba(0,212,255,.10), 0 18px 50px rgba(0,0,0,.30); }
    .orderCard.st-completed{
  background: linear-gradient(135deg,#5a3216,#8b5a2b) !important;
  border-color:#8b5a2b !important;
  box-shadow:0 0 0 3px rgba(139,90,43,.40),0 0 35px rgba(139,90,43,.85) !important;
  color:#fff !important;
}
    .orderCard.st-cancelled{ border-color: rgba(255,61,61,.35); box-shadow:0 0 0 6px rgba(255,61,61,.10), 0 18px 50px rgba(0,0,0,.30); }
    .miniBtn{ padding:10px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.08); color:white; cursor:pointer; font-weight:1000; }
    .miniBtn.danger{ border-color: rgba(255,61,61,.35); background: rgba(255,61,61,.14); }
    .miniBtn.ok{ border-color: rgba(56,255,136,.35); background: rgba(56,255,136,.12); }
    .selBox{ width:22px; height:22px; accent-color: #38ff88; }
    dialog.pbModal{ border:none; border-radius:20px; padding:0; max-width:520px; width:calc(100% - 24px); background:#0c1724; color:white; box-shadow:0 30px 90px rgba(0,0,0,.55); }
    .pbModal .hd{ padding:14px 16px; border-bottom:1px solid rgba(255,255,255,.10); font-weight:1000; display:flex; justify-content:space-between; align-items:center; }
    .pbModal .bd{ padding:14px 16px; display:grid; gap:10px; }
    .pbModal label{ font-weight:900; opacity:.9; }
    .pbModal input,.pbModal textarea,.pbModal select{ width:100%; padding:10px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.06); color:white; outline:none; }
    .pbModal textarea{ min-height:90px; resize:vertical; }
    .pbModal .ft{ padding:14px 16px; border-top:1px solid rgba(255,255,255,.10); display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap; }

  </style>
<script src="../assets/config.js"></script>

<style>
/* === Pretty Bites: Strong Kitchen Status Colors (AUTO) === */
.order-card{
  transition: all .25s ease;
  border-radius: 16px;
  border: 2px solid rgba(255,255,255,.10);
  box-shadow: 0 10px 22px rgba(0,0,0,.25);
}
.order-card .status-pill{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  font-weight:800;
  letter-spacing:.2px;
  border:2px solid rgba(255,255,255,.25);
  backdrop-filter: blur(4px);
}

/* NEW */
.order-card.new{
  background: linear-gradient(135deg,#1346ff,#00c6ff);
  border-color:#00e0ff;
  box-shadow:0 0 0 2px rgba(0,224,255,.35), 0 0 30px rgba(0,150,255,.75);
  animation:pulseNew 1.1s infinite;
}
.order-card.new .status-pill{background:rgba(0,180,255,.25)}

/* WORKING */
.order-card.working{
  background: linear-gradient(135deg,#ff7a00,#ffd000);
  border-color:#ffb700;
  box-shadow:0 0 0 2px rgba(255,183,0,.35), 0 0 30px rgba(255,165,0,.85);
}
.order-card.working .status-pill{background:rgba(255,170,0,.25)}

/* READY */
.order-card.ready{
  background: linear-gradient(135deg,#00b894,#00ff95);
  border-color:#00ffb3;
  box-shadow:0 0 0 2px rgba(0,255,179,.35), 0 0 30px rgba(0,255,170,.85);
}
.order-card.ready .status-pill{background:rgba(0,255,170,.22)}

/* DELAYED */
.order-card.delayed{
  background: linear-gradient(135deg,#7d2ae8,#e056fd);
  border-color:#c56cf0;
  box-shadow:0 0 0 2px rgba(197,108,240,.35), 0 0 30px rgba(200,0,255,.70);
}
.order-card.delayed .status-pill{background:rgba(200,0,255,.20)}

/* DELIVERED */
.order-card.delivered{
  background: linear-gradient(135deg,#1fbf63,#7bed9f);
  border-color:#2ed573;
  box-shadow:0 0 0 2px rgba(46,213,115,.30), 0 0 26px rgba(0,255,100,.70);
  opacity:.92;
}
.order-card.delivered .status-pill{background:rgba(0,255,120,.18)}

/* CANCELLED */
.order-card.cancelled{
  background: linear-gradient(135deg,#ff2a2a,#ff0000);
  border-color:#ff0000;
  box-shadow:0 0 0 2px rgba(255,0,0,.32), 0 0 30px rgba(255,0,0,.80);
  opacity:.90;
}
.order-card.cancelled .status-pill{background:rgba(255,0,0,.18)}

/* Improve text contrast */
.order-card h3, .order-card h4, .order-card p, .order-card li, .order-card strong{
  text-shadow: 0 1px 0 rgba(0,0,0,.35);
}

/* Subtle lift on hover */
.order-card:hover{
  transform: translateY(-2px);
}

@keyframes pulseNew{
  0%{transform:scale(1)}
  50%{transform:scale(1.03)}
  100%{transform:scale(1)}
}
/* === End Strong Colors === */
</style>
</head>
<body>
  <a class="backBtn" id="backBtn" href="#" onclick="history.length>1?history.back():location.href='../index.html';return false;">رجوع</a>
  <div class="topbar">
    <a class="brand" href="dashboard.html">رجوع</a>
  </div>

  <main class="container">
    <div class="kTop">
      <div class="sectionTitle" style="margin:0">شاشة المطبخ (تحديث كل 1 ثانية)</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="pill2 on" data-f="all">الكل</button>
        <button class="pill2" data-f="new">جديد</button>
        <button class="pill2" data-f="preparing">قيد العمل</button>
        <button class="pill2" data-f="delayed">مؤجل</button>
        <button class="pill2" data-f="ready">جاهز</button>
        <button class="pill2" data-f="completed">تم التسليم</button>
      </div>
    </div>

      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <button class="pill2" data-f="cancelled">ملغي</button>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:flex-end">
        <button class="miniBtn ok" id="btnDelSelected">حذف المحدد</button>
        <button class="miniBtn danger" id="btnDelDone">حذف (تم التسليم + ملغي)</button>
      </div>


    <div class="orderGrid" id="grid"></div>
  </main>


  <dialog class="pbModal" id="editModal">
    <div class="hd">
      <div id="mTitle">تعديل الطلب</div>
      <button class="miniBtn" id="mClose" type="button">إغلاق</button>
    </div>
    <div class="bd">
      <input type="hidden" id="mId" />
      <div>
        <label>الحالة</label>
        <select id="mStatus">
          <option value="new">جديد</option>
          <option value="preparing">قيد العمل</option>
          <option value="delayed">مؤجل</option>
          <option value="ready">جاهز</option>
          <option value="completed">تم التسليم</option>
          <option value="cancelled">ملغي</option>
        </select>
      </div>
      <div>
        <label>اسم الزبون</label>
        <input id="mName" placeholder="اسم الزبون" />
      </div>
      <div>
        <label>رقم الهاتف</label>
        <input id="mPhone" placeholder="رقم الهاتف" />
      </div>
      <div>
        <label>Address (if delivery)</label>
        <input id="mAddress" placeholder="العنوان" />
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <label>اليوم</label>
          <input id="mDay" placeholder="مثال: الجمعة" />
        </div>
        <div>
          <label>الوقت</label>
          <input id="mTime" placeholder="مثال: 6:30 PM" />
        </div>
      </div>
      <div>
        <label>ملاحظة داخلية للمطبخ</label>
        <textarea id="mNotes" placeholder="مثال: بدون فستق / زيادة جبنة"></textarea>
      </div>
    </div>
    <div class="ft">
      <button class="miniBtn" id="mSave" type="button">حفظ</button>
      <button class="miniBtn danger" id="mDelete" type="button">حذف الطلب</button>
    </div>
  </dialog>


  <script src="../assets/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>const s = getSettings();
  const ADMIN_KEY = String(window.PB_ADMIN_KEY || s.adminKey || "PB-ADMIN-2323");
  window.sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, {
    global: { headers: { "x-admin-key": ADMIN_KEY } }
  });
</script>
  <script>
    ensureData(); applyTheme();
    if(!adminIsOk()) nav("login.html");

    let filter = "all";
    let lastTop = null;

    async function refreshOrders(){
      if(!window.sb){
        window.ORDERS = getOrders();
        return;
      }
      const { data, error } = await window.sb
        .from("orders")
        .select("*")
        .order("created_at", { ascending:false });
      if(error){
        console.error(error);
        window.ORDERS = getOrders();
        return;
      }
      window.ORDERS = (data||[]).map(r=>{
        const base = (r.data && typeof r.data === "object") ? r.data : {};
        return {
          ...base,
          id: r.id || base.id,
          status: r.status || base.status || "new",
          orderNo: r.order_no || base.orderNo,
          createdAt: r.created_at || base.createdAt,
          total: (r.total ?? base.total),
          deliveryType: r.delivery_type || base.deliveryType,
          customerName: r.customer_name || base.customerName,
          customerPhone: r.customer_phone || base.customerPhone
        };
      });
    }

    document.querySelectorAll("[data-f]").forEach(btn=>{
      btn.onclick = ()=>{
        filter = btn.getAttribute("data-f");
        document.querySelectorAll("[data-f]").forEach(b=>b.classList.remove("on"));
        btn.classList.add("on");
        refreshOrders().then(()=>render());
      };
    });

    function minsSince(iso){
      return Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
    }

    function timerClass(mins){
      if(mins>=15) return "timerR";
      if(mins>=5) return "timerY";
      return "timerG";
    }

    function setStatus(id, status){
      const orders = (window.ORDERS || getOrders());
      const o = orders.find(x=>x.id===id);
      if(!o) return;
      o.status = status;

      // update localStorage (fallback/offline)
      try{ setOrders(orders); }catch(e){}

      // update Supabase if connected
      if(window.sb){
        window.sb.from("orders").update({ status }).eq("id", id).then(({error})=>{
          if(error) console.error(error);
        });
      }
      window.ORDERS = orders;
      render();
    }

    // Delete one order
    async function deleteOrder(id){
      if(!confirm("حذف هذا الطلب؟")) return;
      // local fallback
      try{
        const orders = (window.ORDERS || getOrders()).filter(o=>o.id!==id);
        setOrders(orders);
        window.ORDERS = orders;
      }catch(e){}
      if(window.sb){
        const { error } = await window.sb.from("orders").delete().eq("id", id);
        if(error) console.error(error);
      }
      await refreshOrders(); render();
    }

    function openEdit(id){
      const orders = (window.ORDERS || getOrders());
      const o = orders.find(x=>x.id===id);
      if(!o) return;
      const dlg = document.getElementById("editModal");
      document.getElementById("mId").value = o.id;
      document.getElementById("mTitle").textContent = `تعديل الطلب #${o.orderNo || ""}`.trim();
      document.getElementById("mStatus").value = o.status || "new";
      document.getElementById("mName").value = o.customerName || "";
      document.getElementById("mPhone").value = o.customerPhone || "";
      document.getElementById("mAddress").value = o.address || "";
      document.getElementById("mDay").value = o.day || "";
      document.getElementById("mTime").value = o.time || "";
      document.getElementById("mNotes").value = o.notes || "";
      if(typeof dlg.showModal === "function") dlg.showModal();
      else alert("متصفحك لا يدعم نافذة التعديل، جرّب Chrome/Edge.");
    }

    async function saveEdit(){
      const id = document.getElementById("mId").value;
      const status = document.getElementById("mStatus").value;
      const patch = {
        status,
        customerName: document.getElementById("mName").value.trim(),
        customerPhone: document.getElementById("mPhone").value.trim(),
        address: document.getElementById("mAddress").value.trim(),
        day: document.getElementById("mDay").value.trim(),
        time: document.getElementById("mTime").value.trim(),
        notes: document.getElementById("mNotes").value.trim()
      };
      const orders = (window.ORDERS || getOrders());
      const o = orders.find(x=>x.id===id);
      if(o){
        Object.assign(o, patch);
        try{ setOrders(orders); }catch(e){}
        window.ORDERS = orders;
      }
      if(window.sb){
        // Keep status in its own column, and also store everything in data JSON for compatibility
        const { error } = await window.sb.from("orders").update({
          status: patch.status,
          data: { ...(o||{}), ...patch }
        }).eq("id", id);
        if(error) console.error(error);
      }
      closeModal();
      await refreshOrders(); render();
    }

    function closeModal(){
      const dlg = document.getElementById("editModal");
      if(dlg && typeof dlg.close === "function") dlg.close();
    }

    async function bulkDelete(ids){
      if(!ids.length) return alert("ما في طلبات محددة.");
      if(!confirm(`حذف ${ids.length} طلب؟`)) return;
      // local
      try{
        const orders = (window.ORDERS || getOrders()).filter(o=>!ids.includes(o.id));
        setOrders(orders);
        window.ORDERS = orders;
      }catch(e){}
      if(window.sb){
        const { error } = await window.sb.from("orders").delete().in("id", ids);
        if(error) console.error(error);
      }
      await refreshOrders(); render();
    }

    function selectedIds(){
      return Array.from(document.querySelectorAll("[data-sel]"))
        .filter(x=>x.checked)
        .map(x=>x.getAttribute("data-sel"));
    }


    function stButton(label, st, o){
      const on = (o.status===st) ? "on" : "";
      const p = "";
      return `<button class="stBtn ${on}" data-id="${o.id}" data-st="${st}">${label}</button>`;
    }

    function render(){
      const orders = (window.ORDERS || getOrders());
      const list = (filter==="all") ? orders : orders.filter(o=>o.status===filter);

      const top = orders[0]?.id || null;
      if(top && lastTop && top!==lastTop){ ring(); }
      lastTop = top;

      const grid = document.getElementById("grid");
      grid.innerHTML = list.map(o=>{
        const mins = minsSince(o.createdAt);
        const cls = timerClass(mins);
        const stClass = "st-" + String(o.status||"new");
        return `
          <div class="orderCard ${stClass}" data-oid="${o.id}">
            <div style="display:flex;justify-content:space-between;gap:10px">
              <div>
                <div style="font-weight:1000;font-size:16px">
                  طلب #${o.orderNo}
                  <div style="margin-top:4px" class="${cls}">${mins} دقيقة</div>
                </div>
                <div style="opacity:.85;font-weight:900;margin-top:4px">
                  ${o.deliveryType==="delivery" ? "🚗 Delivery" : "🧍‍♂️ Pickup"}
                </div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-start;gap:8px">
  <label style="display:flex;gap:8px;align-items:center;font-weight:900;opacity:.9">
    <input class="selBox" type="checkbox" data-sel="${o.id}" />
    تحديد
  </label>
  <div style="font-weight:1000;font-size:18px">${money(o.total)}</div>
</div>
            </div>

            <div style="margin-top:10px;padding:10px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)">
              <div style="font-weight:900">${escapeHtml(o.customerName)} — ${escapeHtml(o.customerPhone)}</div>
              ${o.deliveryType==="delivery" ? `<div style="margin-top:6px;opacity:.9"><b>العنوان:</b> ${escapeHtml(o.address||"-")}</div>` : ""}
              <div style="margin-top:6px;opacity:.9"><b>اليوم:</b> ${escapeHtml(o.day||"-")} • <b>الوقت:</b> ${escapeHtml(o.time||"-")}</div>
              ${o.notes ? `<div style="margin-top:8px;padding:10px;border-radius:12px;background:rgba(255, 183, 3, .14);border:1px solid rgba(255, 183, 3, .22)"><b>ملاحظة:</b> ${escapeHtml(o.notes)}</div>` : ""}
            </div>

            <div style="margin-top:10px;font-weight:1000">المنتجات:</div>
            <div style="display:grid;gap:8px;margin-top:8px">
              ${(o.items||[]).map(it=>`
                <div class="itemRow">
                  <div style="font-weight:1000">${escapeHtml(it.name)}</div>
                  <div style="font-weight:1000">× ${it.qty}</div>
                </div>
              `).join("") || `<div style="opacity:.8">لا يوجد عناصر</div>`}
            </div>

            <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;align-items:center">
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="miniBtn" data-edit="${o.id}">تعديل</button>
    <button class="miniBtn danger" data-del="${o.id}">حذف</button>
  </div>
</div>
<div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
              ${stButton("جديد","new",o)}
              ${stButton("قيد العمل","preparing",o)}
              ${stButton("مؤجل","delayed",o)}
              ${stButton("جاهز","ready",o)}
              ${stButton("تم التسليم","completed",o)}
              ${stButton("ملغي","cancelled",o)}
            </div>
          </div>
        `;
      }).join("");

      grid.querySelectorAll("[data-st]").forEach(b=>{
        b.onclick = ()=>{
          const id = b.getAttribute("data-id");
          const st = b.getAttribute("data-st");
          setStatus(id, st);
        };
      });

      grid.querySelectorAll("[data-edit]").forEach(b=>{
        b.onclick = ()=> openEdit(b.getAttribute("data-edit"));
      });
      grid.querySelectorAll("[data-del]").forEach(b=>{
        b.onclick = ()=> deleteOrder(b.getAttribute("data-del"));
      });

    }

    function escapeHtml(str){
      return String(str||"").replace(/[&<>"']/g, s => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[s]));
    }

    
    // Top actions + modal buttons
    document.getElementById("btnDelSelected").onclick = ()=> bulkDelete(selectedIds());
    document.getElementById("btnDelDone").onclick = async ()=>{
      const ids = (window.ORDERS || getOrders()).filter(o=>["completed","cancelled"].includes(o.status)).map(o=>o.id);
      await bulkDelete(ids);
    };
    document.getElementById("mClose").onclick = closeModal;
    document.getElementById("mSave").onclick = saveEdit;
    document.getElementById("mDelete").onclick = ()=> deleteOrder(document.getElementById("mId").value);

// First load
    refreshOrders().then(()=>render());

    // Auto refresh from Supabase (or fallback local) every 1 second
    setInterval(async ()=>{ await refreshOrders(); render(); }, 1000);
  </script>

<audio id="orderBell" src="../assets/bell.mp3" preload="none"></audio>
<script>
let lastOrderCount = 0;

function playBell(){
  const a=document.getElementById("orderBell");
  if(!a) return;
  a.volume=1.0; // أعلى صوت
  a.currentTime=0;
  a.play().catch(()=>{});
}

function checkNewOrders(){
  const orders = JSON.parse(localStorage.getItem("pb_orders_v1") || "[]");
  if(orders.length > lastOrderCount){
    playBell();
  }
  lastOrderCount = orders.length;
}

setInterval(checkNewOrders,2000);
</script>

<script>
/* === Pretty Bites AUTO PATCH: ensure strong coloring classes apply === */
function pbNormalizeOrderCards(){
  try{
    const cards = document.querySelectorAll('[data-order-id], .order, .orderItem, .order-card, .card');
    cards.forEach(c=>{
      // If it looks like an order card, tag it
      if(!c.classList.contains('order-card')) c.classList.add('order-card');

      // Add a status pill if we can find status text
      if(!c.querySelector('.status-pill')){
        const statusEl = c.querySelector('[data-status], .status, .order-status, .badge');
        if(statusEl){
          const pill = document.createElement('span');
          pill.className = 'status-pill';
          pill.textContent = statusEl.textContent.trim();
          statusEl.innerHTML = '';
          statusEl.appendChild(pill);
        }
      }
    });
  }catch(e){}
}
</script>

<script>
/* Call normalize on load + whenever DOM changes (safe) */
document.addEventListener('DOMContentLoaded', ()=>{
  pbNormalizeOrderCards();
  const obs = new MutationObserver(()=>pbNormalizeOrderCards());
  obs.observe(document.body, {childList:true, subtree:true});
});
</script>
